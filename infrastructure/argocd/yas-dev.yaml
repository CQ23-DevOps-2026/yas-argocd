apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: yas-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: REPLACE_WITH_YAS_ARGOCD_REPO_URL
    targetRevision: HEAD
    path: environments/dev
    directory:
      recurse: false
      exclude: "{services/*,values-shared.yaml}"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
