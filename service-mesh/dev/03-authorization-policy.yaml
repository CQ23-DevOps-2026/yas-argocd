# 1. Allow public access from Nginx Ingress to storefront-bff
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: storefront-bff-public
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: storefront-bff
  action: ALLOW
  rules:
    - {}
---
# 2. Allow public access from Nginx Ingress to backoffice-bff
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: backoffice-bff-public
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: backoffice-bff
  action: ALLOW
  rules:
    - {}
---
# 3. Allow public access from Nginx Ingress to Swagger UI
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: swagger-ui-public
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: swagger-ui
  action: ALLOW
  rules:
    - {}
---
# 3a. Allow public access from Nginx Ingress to media (to serve product images)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: media-public
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: media
  action: ALLOW
  rules:
    - {}
---
# 4. Strict product service policy: allow storefront-bff, backoffice-bff, search, cart, and order
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: product-access
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: product
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/dev/sa/storefront-bff"
              - "cluster.local/ns/dev/sa/backoffice-bff"
              - "cluster.local/ns/dev/sa/search"
              - "cluster.local/ns/dev/sa/cart"
              - "cluster.local/ns/dev/sa/order"
---
# 5. Strict search service policy: allow storefront-bff (to query search index)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: search-access
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: search
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/dev/sa/storefront-bff"
---
# 6. Strict cart service policy: allow storefront-bff and order (during checkout)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: cart-access
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cart
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/dev/sa/storefront-bff"
              - "cluster.local/ns/dev/sa/order"
---
# 7. Strict order service policy: allow storefront-bff (to place orders) and backoffice-bff
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: order-access
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: order
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/dev/sa/storefront-bff"
              - "cluster.local/ns/dev/sa/backoffice-bff"
---
# 8. Strict payment service policy: allow order (to execute payments)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: payment-access
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: payment
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/dev/sa/order"
---
# 9. Strict inventory service policy: allow order (to deduct stock) and backoffice-bff
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: inventory-access
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: inventory
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/dev/sa/order"
              - "cluster.local/ns/dev/sa/backoffice-bff"
---
# 10. Strict tax service policy: allow order (to calculate taxes)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: tax-access
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: tax
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/dev/sa/order"
---
# 11. Allow storefront-bff, backoffice-bff, product, order, storefront-ui, and backoffice-ui to access any service in the dev namespace
# This automatically protects all general services (customer, media, rating, etc.) from unauthorized pods
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: bff-to-any-backend
  namespace: dev
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/dev/sa/storefront-bff"
              - "cluster.local/ns/dev/sa/backoffice-bff"
              - "cluster.local/ns/dev/sa/product"
              - "cluster.local/ns/dev/sa/order"
              - "cluster.local/ns/dev/sa/storefront-ui"
              - "cluster.local/ns/dev/sa/backoffice-ui"
---
# 12. Allow public access to OpenAPI/Swagger docs of all services so Swagger UI can load them
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: public-api-docs
  namespace: dev
spec:
  action: ALLOW
  rules:
    - to:
        - operation:
            paths:
              - "*/v3/api-docs"
              - "/v3/api-docs"
              - "/v3/api-docs/*"
              - "/swagger-ui*"
