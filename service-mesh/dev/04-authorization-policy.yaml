# =====================================================================
# NHÓM 2: PHÂN QUYỀN S2S NGHIÊM NGẶT (KÈM MỞ SWAGGER ĐỘC LẬP)
# =====================================================================

# 6. Product Service: Giới hạn S2S + Mở API Docs cho Swagger UI
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: product-access
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: product
  action: ALLOW
  rules:
    # Rule S2S nghiêm ngặt
    - from:
        - source:
            principals:
              - "cluster.local/ns/dev/sa/storefront-bff"
              - "cluster.local/ns/dev/sa/backoffice-bff"
              - "cluster.local/ns/dev/sa/search"
              - "cluster.local/ns/dev/sa/cart"
              - "cluster.local/ns/dev/sa/order"
    # Rule mở tài liệu API
    - to:
        - operation:
            paths:
              - "*/v3/api-docs"
              - "/v3/api-docs"
              - "/v3/api-docs/*"
              - "/swagger-ui*"
---
