# =====================================================================
# NHÓM 1: CÁC DỊCH VỤ MỞ CỔNG CÔNG CỘNG (PUBLIC / INGRESS ACCESSIBLE)
# =====================================================================

# 1. Cho phép truy cập công cộng vào Storefront BFF
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: storefront-bff-public
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: storefront-bff
  action: ALLOW
  rules:
    - {}
---
# 2. Cho phép truy cập công cộng vào Backoffice BFF
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: backoffice-bff-public
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: backoffice-bff
  action: ALLOW
  rules:
    - {}
---
# 3. Cho phép truy cập công cộng vào Swagger UI
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: swagger-ui-public
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: swagger-ui
  action: ALLOW
  rules:
    - {}
---
# 4. Cho phép truy cập công cộng vào Media Service (để xem/tải ảnh sản phẩm)
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
