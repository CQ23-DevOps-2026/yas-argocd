# =====================================================================
# NHÓM 2: PHÂN QUYỀN S2S NGHIÊM NGẶT (STRICT SERVICE-TO-SERVICE)
# =====================================================================

# 7. Product Service: Nhận yêu cầu từ BFFs, Search, Cart và Order
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: product-access
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: product
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/dev/sa/storefront-bff"
              - "cluster.local/ns/dev/sa/backoffice-bff"
              - "cluster.local/ns/dev/sa/search"
              - "cluster.local/ns/dev/sa/cart"
              - "cluster.local/ns/dev/sa/order"
---
# 8. Search Service: Cho phép người dùng tìm kiếm sản phẩm qua BFF
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: search-access
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: search
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/dev/sa/storefront-bff"
              - "cluster.local/ns/dev/sa/backoffice-bff"
---
# 9. Cart Service: Cho phép người dùng sửa giỏ hàng và Order lấy thông tin khi checkout
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: cart-access
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cart
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/dev/sa/storefront-bff"
              - "cluster.local/ns/dev/sa/order"
---
# 10. Order Service: Nhận lệnh tạo đơn từ Storefront BFF và xem đơn từ Backoffice BFF
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: order-access
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: order
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/dev/sa/storefront-bff"
              - "cluster.local/ns/dev/sa/backoffice-bff"
---
# 11. Payment Service: Chỉ cho phép dịch vụ Order gọi để xử lý thanh toán
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: payment-access
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: payment
  action: ALLOW
  rules:
    - from:
