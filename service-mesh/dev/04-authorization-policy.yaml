apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: public-api-docs
  namespace: dev
spec:
  action: ALLOW
  rules:
    - to:
        - operation:
            paths:
              - "*/v3/api-docs"
              - "/v3/api-docs"
              - "/v3/api-docs/*"
              - "/swagger-ui*"
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: product-access
  namespace: dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: product
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/dev/sa/storefront-bff
              - cluster.local/ns/dev/sa/backoffice-bff
              - cluster.local/ns/dev/sa/search
              - cluster.local/ns/dev/sa/cart
              - cluster.local/ns/dev/sa/order
---
