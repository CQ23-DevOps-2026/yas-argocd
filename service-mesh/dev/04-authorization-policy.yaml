# =====================================================================
# NHÓM 3: TIỆN ÍCH HỆ THỐNG (SYSTEM WIDE UTILITIES)
# =====================================================================

# 15. Cho phép truy cập public vào API Docs của các service
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: public-api-docs
  namespace: dev
spec:
  action: ALLOW
  rules:
    - to:
        - operation:
            paths:
              - "*/v3/api-docs"
              - "/v3/api-docs"
              - "/v3/api-docs/*"
              - "/swagger-ui*"
---
# 16. Cho phép giám sát Prometheus & Health Check hoạt động bình thường trên port 8090
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: prometheus-and-probes-allow
  namespace: dev
spec:
  action: ALLOW
  rules:
    - to:
        - operation:
            ports: ["8090"]
