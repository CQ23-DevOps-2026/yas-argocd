# Configure auto-retry policy for tax service
# Includes an optional Fault Injection block (commented out) to simulate 50% chance of HTTP 500 errors for demo
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: tax-retry
  namespace: dev
spec:
  hosts:
    - tax
  http:
    # --- DEMO FAULT INJECTION (Uncomment this section to simulate 50% HTTP 500 failures) ---
    # - fault:
    #     abort:
    #       httpStatus: 500
    #       percentage:
    #         value: 50.0
    #   route:
    #     - destination:
    #         host: tax
    #         port:
    #           number: 80
    # -------------------------------------------------------------------------------------
    - route:
        - destination:
            host: tax
            port:
              number: 80
      retries:
        attempts: 3
        perTryTimeout: 2s
        retryOn: "5xx,connect-failure,refused-stream"
